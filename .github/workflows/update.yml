name: Auto Update VPN Lists

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lists:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests geoip2
      
      - name: Install GeoLite2-Country.mmdb
        run: curl -L "https://git.io/GeoLite2-Country.mmdb" -o GeoLite2-Country.mmdb

      - name: Run script
        run: python update.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add black_list.txt white_list.txt black_list_checked.txt white_list_checked.txt
          git commit -m "Auto-update lists" || echo "No changes to commit"
          git push
