name: Auto Update VPN Lists

on:
  schedule:
    - cron: '0 */2 * * *'
  
  workflow_dispatch:

jobs:
  update-lists:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Update Script
        run: python update_lists.py

      - name: Commit and Push if Changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Добавляем файлы (игнорируем ошибку если файлов нет)
          git add black_list.txt white_list.txt 2>/dev/null || true
          
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "✅ Изменений нет. Пропускаем коммит."
          else
            echo "🔄 Найдены изменения. Коммитим и пушим..."
            git commit -m "Auto-update lists: $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "✅ Обновление успешно опубликовано."
          fi
